# Route10 VPN Project Configuration
# Edit this file to override default runtime settings.

# Runtime namespace prefix (used in tmp paths and generated hotplug names)
VPN_PREFIX="vpnx1"

# Auto-allocation range for routing tables used by this project.
# Keep this range isolated from other VPN managers on the router.
VPN_RT_START=1000
VPN_RT_END=1499

# SQLite busy timeout (milliseconds) for concurrent commit/hotplug writers.
# Default requested for migration parity.
PBR_DB_BUSY_TIMEOUT_MS=5000

# Default IPv6 behavior for new interfaces:
# - nat66: existing behavior (NAT66 for provider-style host IPv6)
# - routed-prefix: delegated /64 client-routing mode (no NAT66)
# - disabled: force IPv4-only behavior for managed targets
VPN_IPV6_MODE_DEFAULT="nat66"

# Routed-prefix verification tuning.
VPN_IPV6_ROUTED_VERIFY_TIMEOUT_SEC=5
VPN_IPV6_ROUTED_VERIFY_RETRIES=3
VPN_IPV6_ROUTED_PROBE_ADDR="2606:4700:4700::1111"

# If 0, routed-prefix setup refuses to overwrite existing downstream RA/DHCPv6
# ownership that was not previously captured by this project.
VPN_IPV6_FORCE_TAKEOVER=0

# Legacy alias (kept for compatibility with migrated naming)
WG_DB_BUSY_TIMEOUT_MS="$PBR_DB_BUSY_TIMEOUT_MS"

# Auto-update settings for route10-vpn-client scripts/rules.
# 0 = disabled (default), 1 = enabled
VPN_ENABLE_AUTO_UPDATE=0

# Daily updater cron schedule.
VPN_UPDATE_CRON="40 4 * * *"
