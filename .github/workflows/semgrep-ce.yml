name: Semgrep CE

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  shell-security:
    name: Shell security rules
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Install Semgrep CE
        shell: bash
        run: |
          python3 -m pip install --user --upgrade semgrep
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"

      - name: Run local Semgrep rules
        shell: bash
        run: semgrep scan --config .semgrep/route10-shell-security.yml --error --metrics=off
